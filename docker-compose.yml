services:

  escolinhapro_app_fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: escolinhapro/php-fpm:dev
    container_name: escolinhapro_app_fpm
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker
    networks:
      - escolinhapro_network
    depends_on:
      escolinhapro_app_postgres:
        condition: service_healthy
      escolinhapro_app_redis:
        condition: service_healthy

  escolinhapro_app_nginx:
    image: nginx:alpine
    container_name: escolinhapro_app_nginx
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8003}:80"
    networks:
      - escolinhapro_network
    depends_on:
      - escolinhapro_app_fpm

  escolinhapro_app_postgres:
    image: postgres:16-alpine
    container_name: escolinhapro_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: escolinhapro
      POSTGRES_USER: escolinhapro
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    networks:
      - escolinhapro_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escolinhapro -d escolinhapro"]
      interval: 5s
      timeout: 5s
      retries: 10

  escolinhapro_app_redis:
    image: redis:alpine
    container_name: escolinhapro_app_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    networks:
      - escolinhapro_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  escolinhapro_app_queue:
    image: escolinhapro/php-fpm:dev
    container_name: escolinhapro_app_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    env_file:
      - .env.docker
    networks:
      - escolinhapro_network
    depends_on:
      escolinhapro_app_fpm:
        condition: service_started
      escolinhapro_app_redis:
        condition: service_healthy
      escolinhapro_app_postgres:
        condition: service_healthy
    command: ["/usr/bin/supervisord", "-n", "-c", "/etc/supervisor/conf.d/supervisord.conf"]

networks:
  escolinhapro_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
